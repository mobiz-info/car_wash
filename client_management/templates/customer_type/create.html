{% extends 'base.html' %}

{% block title %}Customer Management - Car Wash Admin{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block breadcrumb_active %}Customer Management{% endblock %}

{% block content %}

<div class="premium-form-container">
    <div class="premium-form-title">
        <i class="ph ph-map-pin-line" style="color: #3b82f6; font-size: 1.5rem;"></i>
        {{ title }}
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Customer Type</label>
            {{ form.name }}
        </div>
        
        

        <div class="form-actions">
            <a href="{% url 'state_list' %}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">
                <i class="ph ph-check-circle"></i> Save 
            </button>
        </div>
    </form>
</div>

{% endblock %}
