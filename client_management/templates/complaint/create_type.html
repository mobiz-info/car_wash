{% extends 'base.html' %}

{% block title %}Add Complaint Type - Wash Pilot Admin{% endblock %}
{% block page_title %}Add Complaint Type{% endblock %}
{% block breadcrumb_active %}Add Type{% endblock %}

{% block content %}
<div class="premium-form-container">
    <div class="premium-form-title">
        <i class="ph ph-plus-circle" style="color: #000080; font-size: 1.5rem;"></i>
        Add Complaint Type
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Complaint Type Name</label>
            <input type="text" name="name" id="name" required placeholder="e.g. Machine Breakdown">
        </div>

        <div class="form-actions">
            <a href="{% url 'complaint_create' %}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary" style="background:#000080;">Add Type</button>
        </div>
    </form>
</div>
{% endblock %}
