{% extends 'base.html' %}

{% block title %}Vehicle Color - Mobiz Car Wash Solution{% endblock %}
{% block page_title %}Vehicle Color{% endblock %}
{% block breadcrumb_active %}Vehicle Color{% endblock %}

{% block content %}

<div class="premium-form-container">
    <div class="premium-form-title">
        <i class="ph ph-paint-brush" style="color: #3b82f6; font-size: 1.5rem;"></i>
        {{ title }}
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Color Name</label>
            {{ form.name }}
        </div>

        <div class="form-actions">
            <a href="{% url 'vehicle_color_list' %}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">
                <i class="ph ph-check-circle"></i> Save 
            </button>
        </div>
    </form>
</div>

{% endblock %}
