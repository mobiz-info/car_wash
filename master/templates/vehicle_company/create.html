{% extends 'base.html' %}

{% block title %}Vehicle Company - Mobiz Car Wash Solution{% endblock %}
{% block page_title %}Vehicle Company{% endblock %}
{% block breadcrumb_active %}Vehicle Company{% endblock %}

{% block content %}

<div class="premium-form-container">
    <div class="premium-form-title">
        <i class="ph ph-factory" style="color: #3b82f6; font-size: 1.5rem;"></i>
        {{ title }}
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Company/Brand Name</label>
            {{ form.name }}
        </div>

        <div class="form-actions">
            <a href="{% url 'vehicle_company_list' %}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">
                <i class="ph ph-check-circle"></i> Save 
            </button>
        </div>
    </form>
</div>

{% endblock %}
