{% extends 'base.html' %}

{% block title %}Create Weekly Off - Mobiz Car Wash Solution{% endblock %}
{% block page_title %}Create Weekly Off{% endblock %}
{% block breadcrumb_active %}Weekly Off Days{% endblock %}

{% block content %}

<style>
    .premium-form-container {
        max-width: 850px;
        background: white;
        padding: 32px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        margin: auto;
    }

    .premium-form-title {
        font-size: 1.3rem;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .form-group label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #475569;
        text-transform: uppercase;
    }

    .form-group select,
    .form-group input {
        padding: 10px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 0.9rem;
        transition: 0.2s;
        width: 100%;
    }

    .form-group select:focus,
    .form-group input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
        outline: none;
    }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #f1f5f9;
    }

    .btn-secondary {
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: white;
        text-decoration: none;
        color: #475569;
        transition: 0.2s;
    }

    .btn-secondary:hover {
        background: #f8fafc;
        color: #475569;
    }

    .btn-primary {
        padding: 10px 22px;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: 0.2s;
    }

    .btn-primary:hover {
        background: #2563eb;
    }

    .error-text {
        color: #ef4444;
        font-size: 0.75rem;
    }
</style>

<div class="premium-form-container">

    <div class="premium-form-title">
        <i class="ph ph-calendar-check" style="color:#3b82f6;"></i>
        Create Weekly Off Day
    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="form-grid">

            <!-- Branch -->

            <div class="form-group">

                <label>Branch *</label>

                <select name="branch" required>

                    <option value="">
                        Select Branch
                    </option>

                    {% for branch in branches %}

                    <option value="{{ branch.id }}">
                        {{ branch.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <!-- Weekly Off Day -->

            <div class="form-group">

                <label>Weekly Off Day *</label>

                <select name="day" required>

                    <option value="">
                        Select Day
                    </option>

                    {% for value,label in days %}

                    <option value="{{ value }}">
                        {{ label }}
                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <div class="form-actions">

            <a href="{% url 'weekly_off_list' %}"
               class="btn-secondary">

                Cancel

            </a>

            <button type="submit"
                    class="btn-primary">

                <i class="ph ph-check-circle"></i>
                Save Weekly Off

            </button>

        </div>

    </form>

</div>

{% endblock %}
