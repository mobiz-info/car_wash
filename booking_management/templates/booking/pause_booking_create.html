{% extends 'base.html' %}

{% block title %}Pause Booking - Mobiz Car Wash Solution{% endblock %}
{% block page_title %}Pause Booking{% endblock %}
{% block breadcrumb_active %}Pause Booking{% endblock %}

{% block content %}

<style>

.premium-form-container{
    max-width:900px;
    background:#fff;
    padding:32px;
    border-radius:12px;
    border:1px solid #e2e8f0;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    margin:auto;
}

.premium-form-title{
    font-size:1.3rem;
    font-weight:600;
    color:#1e293b;
    margin-bottom:24px;
    padding-bottom:16px;
    border-bottom:1px solid #f1f5f9;
    display:flex;
    align-items:center;
    gap:10px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.form-group.full-width{
    grid-column:1/-1;
}

.form-group label{
    font-size:.8rem;
    font-weight:600;
    color:#475569;
    text-transform:uppercase;
}

.form-group input,
.form-group select,
.form-group textarea{
    padding:10px 14px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:.9rem;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color:#3b82f6;
    outline:none;
    box-shadow:0 0 0 2px rgba(59,130,246,.1);
}

.form-actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid #f1f5f9;
}

.btn-secondary{
    padding:10px 18px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    background:#fff;
    text-decoration:none;
    color:#475569;
}

.btn-primary{
    padding:10px 22px;
    border:none;
    border-radius:8px;
    background:#dc2626;
    color:#fff;
    cursor:pointer;
}

.btn-primary:hover{
    background:#b91c1c;
}

</style>

<div class="premium-form-container">

    <div class="premium-form-title">
        <i class="ph ph-pause-circle" style="color:#dc2626;"></i>
        Pause Booking
    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Branch *</label>

                <select name="branch" required>

                    <option value="">
                        Select Branch
                    </option>

                    {% for branch in branches %}

                    <option value="{{ branch.id }}">
                        {{ branch.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div></div>

            <div class="form-group">
                <label>From Date *</label>

                <input type="date"
                       name="from_date"
                       required>
            </div>

            <div class="form-group">
                <label>To Date *</label>

                <input type="date"
                       name="to_date"
                       required>
            </div>

            <div class="form-group full-width">
                <label>Reason</label>

                <textarea name="reason"
                          rows="4"
                          placeholder="Enter pause reason (optional)"></textarea>
            </div>

        </div>

        <div class="form-actions">

            <a href="{% url 'pause_booking_list' %}"
               class="btn-secondary">
                Cancel
            </a>

            <button type="submit"
                    class="btn-primary">

                <i class="ph ph-floppy-disk"></i>
                Save

            </button>

        </div>

    </form>

</div>

{% endblock %}
