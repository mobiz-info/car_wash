<!-- templates/receipt/create.html -->

{% extends 'base.html' %}

{% block title %}Create Receipt - Mobiz Car Wash Solution{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block breadcrumb_active %}Receipt{% endblock %}

{% block content %}
<style>
.form-control{
    width:100%;
    padding:12px 14px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:14px;
    background:#fff;
    box-sizing:border-box;
}

textarea.form-control{
    resize:vertical;
    min-height:90px;
}

input[type="date"].form-control{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    height:48px;
    padding:12px 14px;
}
</style>
<div class="premium-form-container">

    <!-- Title -->
    <div class="premium-form-title">
        <i class="ph ph-receipt" style="color:#2563eb; font-size:1.5rem;"></i>
        {{ title }}
    </div>

    <form method="POST">

        {% csrf_token %}

        <!-- Invoice -->

        <div class="form-group">

            <label>Invoice</label>

            <select name="invoice"
                    required
                    class="form-control"
                    id="invoice-select">

                <option value="">Select Invoice</option>

                {% for invoice in invoices %}

                <option value="{{ invoice.id }}"
                    {% if selected_invoice.id == invoice.id %}
                        selected
                    {% endif %}>

                    {{ invoice.invoice_number }}
                    -
                    {{ invoice.customer.name }}

                </option>

                {% endfor %}

            </select>

        </div>

        

        <!-- Payment Mode -->

        <div class="form-group">

            <label>Payment Mode</label>

            <select name="payment_mode"
                    required
                    class="form-control"
                    id="payment-mode">

                <option value="">Select Payment Mode</option>

                <option value="cash">
                    Cash
                </option>

                <option value="card">
                    Card
                </option>

                <option value="digital_payments">
                    Digital Payments
                </option>

            </select>

        </div>
        <!-- Amount -->

        <div class="form-group">

            <label>Received Amount</label>

            <input type="number"
                   step="0.01"
                   name="amount"
                   required
                   class="form-control"
                   placeholder="Enter received amount">

        </div>

        <!-- Remarks -->

        <div class="form-group">

            <label>Remarks</label>

            <textarea name="remarks"
                      rows="3"
                      class="form-control"
                      placeholder="Enter remarks"></textarea>

        </div>

        <!-- Cheque Section -->

        <div id="cheque-section"
             style="display:none;">

            <div class="premium-form-title"
                 style="font-size:1rem;
                        margin-top:20px;
                        margin-bottom:16px;">

                <i class="ph ph-bank"
                   style="color:#f59e0b;"></i>

                Cheque Details

            </div>

            <div class="form-group">

                <label>Cheque Number</label>

                <input type="text"
                       name="cheque_no"
                       class="form-control"
                       placeholder="Enter cheque number">

            </div>

            <div class="form-group">

                <label>Cheque Date</label>

                <input type="date"
                       name="cheque_date"
                       class="form-control">

            </div>

            <div class="form-group">

                <label>Bank Name</label>

                <input type="text"
                       name="bank_name"
                       class="form-control"
                       placeholder="Enter bank name">

            </div>

        </div>

        <!-- Buttons -->

        <div class="form-actions">

            <a href="{% url 'receipt_list' %}"
               class="btn-secondary">

                Cancel

            </a>

            <button type="submit"
                    class="btn-primary">

                <i class="ph ph-check-circle"></i>
                Save Receipt

            </button>

        </div>

    </form>

</div>

<script>

document
.getElementById('payment-mode')
.addEventListener('change', function () {

    let chequeSection =
        document.getElementById('cheque-section');

    if (this.value === 'cheque') {

        chequeSection.style.display = 'block';

    } else {

        chequeSection.style.display = 'none';

    }

});

</script>

{% endblock %}
